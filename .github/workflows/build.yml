name: Build LiteTerm

on:
  push:
    tags: ['v*', 'dev-*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # dev 分支只编译 Windows,加快调试周期
          # - platform: ubuntu-22.04
          #   target: linux
          # - platform: macos-latest
          #   target: macos
          - platform: windows-latest
            target: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            patchelf

      - name: Install Windows dependencies (pre-built OpenSSL)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          choco install openssl -y --no-progress
          echo "OPENSSL_DIR=C:\Program Files\OpenSSL-Win64" >> $env:GITHUB_ENV
          echo "OPENSSL_NO_VENDOR=1" >> $env:GITHUB_ENV

      - name: Generate changelog
        id: changelog
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" -30)
          else
            COMMITS=$(git log --pretty=format:"%s" ${PREV_TAG}..${{ github.ref_name }})
          fi

          FEAT=""
          FIX=""
          OTHER=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            clean=$(echo "$line" | sed 's/^[a-z]*: //' | sed 's/^[a-z]*(//' | sed 's/): /: /')
            if echo "$line" | grep -qiE "^feat"; then
              FEAT="$FEAT- ✨ $clean\n"
            elif echo "$line" | grep -qiE "^fix|^修复"; then
              FIX="$FIX- 🐛 $clean\n"
            elif echo "$line" | grep -qiE "^chore|^refactor|^docs"; then
              OTHER="$OTHER- 📝 $clean\n"
            else
              OTHER="$OTHER- $clean\n"
            fi
          done <<< "$COMMITS"

          echo "body<<ENDOFLOG" >> $GITHUB_OUTPUT
          echo "## 更新内容" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          [ -n "$FEAT" ] && echo -e "### 新功能\n$FEAT" >> $GITHUB_OUTPUT
          [ -n "$FIX" ] && echo -e "### 修复\n$FIX" >> $GITHUB_OUTPUT
          [ -n "$OTHER" ] && echo -e "### 其他\n$OTHER" >> $GITHUB_OUTPUT
          echo "---" >> $GITHUB_OUTPUT
          echo "下载对应平台的安装包:" >> $GITHUB_OUTPUT
          echo "- **Linux**: .deb / .rpm / .AppImage" >> $GITHUB_OUTPUT
          echo "- **macOS**: .dmg" >> $GITHUB_OUTPUT
          echo "- **Windows**: .exe" >> $GITHUB_OUTPUT
          echo "ENDOFLOG" >> $GITHUB_OUTPUT

      - name: Set version from tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          # v0.9.0 → 0.9.0 ; dev-0.8.11 → 0.8.11-dev
          if [[ "$TAG" == v* ]]; then
            VERSION="${TAG#v}"
          elif [[ "$TAG" == dev-* ]]; then
            VERSION="${TAG#dev-}-dev"
          else
            VERSION="0.0.${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION"
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          rm -f src-tauri/tauri.conf.json.bak
          grep '"version"' src-tauri/tauri.conf.json

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Rust clippy
        if: matrix.target == 'linux'
        working-directory: src-tauri
        run: cargo clippy -- -D warnings 2>&1 || true

      - name: Rust tests
        if: matrix.target == 'linux'
        run: cargo test 2>&1 || true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # dev tag 只编译不发 Release(产物从 Actions Artifacts 下载)
          # 正式 v* tag 才创建 Release
          tagName: ${{ startsWith(github.ref_name, 'v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref_name, 'v') && format('LiteTerm {0}', github.ref_name) || '' }}
          releaseBody: ${{ steps.changelog.outputs.body || '' }}
          releaseDraft: false
          prerelease: false

      - name: Upload Linux artifacts
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: LiteTerm-linux${{ startsWith(github.ref_name, 'dev-') && '-dev' || '' }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload macOS artifacts
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: LiteTerm-macos${{ startsWith(github.ref_name, 'dev-') && '-dev' || '' }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

      - name: Upload Windows artifacts
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: LiteTerm-windows${{ startsWith(github.ref_name, 'dev-') && '-dev' || '' }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
