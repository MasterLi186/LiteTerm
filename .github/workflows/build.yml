name: Build LiteTerm

on:
  push:
    tags: ['v*', 'dev-*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 根据 tag 类型决定编译平台
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == v* ]]; then
            # 正式版：全平台
            echo 'matrix={"include":[{"platform":"ubuntu-22.04","target":"linux"},{"platform":"macos-latest","target":"macos"},{"platform":"windows-latest","target":"windows"}]}' >> $GITHUB_OUTPUT
          else
            # dev 版：只编译 Windows
            echo 'matrix={"include":[{"platform":"windows-latest","target":"windows"}]}' >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"

          # 找同类型的上一个 tag：dev-* 找上一个 dev-*，v* 找上一个 v*
          if [[ "$TAG" == dev-* ]]; then
            PREV_TAG=$(git tag --sort=-creatordate | grep '^dev-' | grep -v "^${TAG}$" | head -1)
          else
            PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | grep -v "^${TAG}$" | head -1)
          fi

          echo "当前 tag: $TAG"
          echo "上一个同类 tag: ${PREV_TAG:-无}"

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%h %s" -50)
          else
            COMMITS=$(git log --pretty=format:"%h %s" ${PREV_TAG}..$TAG)
          fi

          FEAT=""
          FIX=""
          OTHER=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            hash=$(echo "$line" | cut -d' ' -f1)
            msg=$(echo "$line" | cut -d' ' -f2-)
            if echo "$msg" | grep -qiE "^feat"; then
              FEAT="${FEAT}- ✨ ${msg} (${hash})\n"
            elif echo "$msg" | grep -qiE "^fix|^修复"; then
              FIX="${FIX}- 🐛 ${msg} (${hash})\n"
            elif echo "$msg" | grep -qiE "^chore|^refactor|^docs"; then
              OTHER="${OTHER}- 📝 ${msg} (${hash})\n"
            else
              OTHER="${OTHER}- ${msg} (${hash})\n"
            fi
          done <<< "$COMMITS"

          TOTAL=$(echo "$COMMITS" | grep -c . || true)

          # 输出到 Job Summary（所有 tag 都显示）
          echo "## 📋 Changelog: ${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "对比: \`${PREV_TAG:-初始}\` → \`${TAG}\` (${TOTAL} 个提交)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          [ -n "$FEAT" ] && echo -e "### 新功能\n${FEAT}" >> $GITHUB_STEP_SUMMARY
          [ -n "$FIX" ] && echo -e "### 修复\n${FIX}" >> $GITHUB_STEP_SUMMARY
          [ -n "$OTHER" ] && echo -e "### 其他\n${OTHER}" >> $GITHUB_STEP_SUMMARY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            patchelf

      - name: Install Windows dependencies (NASM for OpenSSL)
        if: matrix.target == 'windows'
        uses: ilammy/setup-nasm@v1

      - name: Set version from tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == v* ]]; then
            VERSION="${TAG#v}"
          elif [[ "$TAG" == dev-* ]]; then
            VERSION="${TAG#dev-}-dev"
          else
            VERSION="0.0.${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION"
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          rm -f src-tauri/tauri.conf.json.bak
          grep '"version"' src-tauri/tauri.conf.json

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build frontend for clippy
        if: matrix.target == 'linux'
        run: npm run build

      - name: Rust clippy
        if: matrix.target == 'linux'
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Rust tests
        if: matrix.target == 'linux'
        working-directory: src-tauri
        run: cargo test

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0

      - name: Upload Windows artifacts
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: LiteTerm-windows
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Linux artifacts
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: LiteTerm-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload macOS artifacts
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: LiteTerm-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg

  # 正式版 Release（仅 v* tag 触发，dev-* 不触发）
  release:
    needs: build
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release changelog
        id: changelog
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%h %s" -50)
          else
            COMMITS=$(git log --pretty=format:"%h %s" ${PREV_TAG}..$TAG)
          fi

          FEAT=""
          FIX=""
          OTHER=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            hash=$(echo "$line" | cut -d' ' -f1)
            msg=$(echo "$line" | cut -d' ' -f2-)
            if echo "$msg" | grep -qiE "^feat"; then
              FEAT="${FEAT}- ✨ ${msg} (${hash})\n"
            elif echo "$msg" | grep -qiE "^fix|^修复"; then
              FIX="${FIX}- 🐛 ${msg} (${hash})\n"
            elif echo "$msg" | grep -qiE "^chore|^refactor|^docs"; then
              OTHER="${OTHER}- 📝 ${msg} (${hash})\n"
            else
              OTHER="${OTHER}- ${msg} (${hash})\n"
            fi
          done <<< "$COMMITS"

          {
            echo "body<<ENDOFLOG"
            echo "## 更新内容"
            echo ""
            [ -n "$FEAT" ] && echo -e "### 新功能\n${FEAT}"
            [ -n "$FIX" ] && echo -e "### 修复\n${FIX}"
            [ -n "$OTHER" ] && echo -e "### 其他\n${OTHER}"
            echo "---"
            echo "下载对应平台的安装包:"
            echo "- **Windows**: .exe / .msi"
            echo "- **Linux**: .deb / .rpm / .AppImage"
            echo "- **macOS**: .dmg"
            echo "ENDOFLOG"
          } >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LiteTerm ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
