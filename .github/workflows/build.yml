name: Build LiteTerm

on:
  push:
    tags: ['v*']
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: macos-latest
            target: macos
          - platform: windows-latest
            target: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            patchelf

      - name: Install Windows dependencies (NASM for OpenSSL)
        if: matrix.target == 'windows'
        uses: ilammy/setup-nasm@v1

      - name: Generate changelog
        id: changelog
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" -30)
          else
            COMMITS=$(git log --pretty=format:"%s" ${PREV_TAG}..${{ github.ref_name }})
          fi

          FEAT=""
          FIX=""
          OTHER=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            clean=$(echo "$line" | sed 's/^[a-z]*: //' | sed 's/^[a-z]*(//' | sed 's/): /: /')
            if echo "$line" | grep -qiE "^feat"; then
              FEAT="$FEAT- ✨ $clean\n"
            elif echo "$line" | grep -qiE "^fix|^修复"; then
              FIX="$FIX- 🐛 $clean\n"
            elif echo "$line" | grep -qiE "^chore|^refactor|^docs"; then
              OTHER="$OTHER- 📝 $clean\n"
            else
              OTHER="$OTHER- $clean\n"
            fi
          done <<< "$COMMITS"

          echo "body<<ENDOFLOG" >> $GITHUB_OUTPUT
          echo "## 更新内容" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          [ -n "$FEAT" ] && echo -e "### 新功能\n$FEAT" >> $GITHUB_OUTPUT
          [ -n "$FIX" ] && echo -e "### 修复\n$FIX" >> $GITHUB_OUTPUT
          [ -n "$OTHER" ] && echo -e "### 其他\n$OTHER" >> $GITHUB_OUTPUT
          echo "---" >> $GITHUB_OUTPUT
          echo "下载对应平台的安装包:" >> $GITHUB_OUTPUT
          echo "- **Linux**: .deb / .rpm / .AppImage" >> $GITHUB_OUTPUT
          echo "- **macOS**: .dmg" >> $GITHUB_OUTPUT
          echo "- **Windows**: .msi / .exe" >> $GITHUB_OUTPUT
          echo "ENDOFLOG" >> $GITHUB_OUTPUT

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('LiteTerm {0}', github.ref_name) || '' }}
          releaseBody: ${{ steps.changelog.outputs.body || 'See the assets below for downloads.' }}
          releaseDraft: false
          prerelease: ${{ github.ref == 'refs/heads/dev' }}

      - name: Upload Linux artifacts
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: LiteTerm-linux${{ github.ref == 'refs/heads/dev' && '-dev' || '' }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload macOS artifacts
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: LiteTerm-macos${{ github.ref == 'refs/heads/dev' && '-dev' || '' }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

      - name: Upload Windows artifacts
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: LiteTerm-windows${{ github.ref == 'refs/heads/dev' && '-dev' || '' }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
